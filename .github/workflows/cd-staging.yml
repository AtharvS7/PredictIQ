name: CD — Deploy to Staging

on:
  push:
    branches: [dev]

jobs:
  deploy-staging:
    name: "Deploy staging (dev)"
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: "Build frontend for staging"
        run: |
          npm ci --prefix frontend
          cd frontend && VITE_API_BASE_URL="${{ secrets.STAGING_API_URL }}/api/v1" \
            VITE_APP_ENV=staging npm run build

      # ── Backend: Deploy to Railway ────────────────────────────
      - name: "Install Railway CLI"
        run: npm install -g @railway/cli

      - name: "Deploy backend to Railway"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: |
          railway up \
            --service Predictify-backend-staging \
            --detach

      # ── Frontend: Deploy to Vercel ────────────────────────────
      - name: "Install Vercel CLI"
        run: npm install -g vercel

      - name: "Deploy frontend to Vercel (staging)"
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel deploy frontend/dist \
            --token $VERCEL_TOKEN \
            --no-wait \
            --env VITE_API_BASE_URL="${{ secrets.STAGING_API_URL }}"

      # ── Smoke test staging deployment ─────────────────────────
      - name: "Wait for Railway deployment"
        run: sleep 30

      - name: "Smoke test — staging health check"
        env:
          STAGING_URL: ${{ secrets.STAGING_API_URL }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "$STAGING_URL/api/v1/health")
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: Staging health check returned HTTP $STATUS"
            exit 1
          fi
          echo "PASS: Staging is live — HTTP $STATUS"
          curl -s "$STAGING_URL/api/v1/health" | python3 -m json.tool

      - name: "Post deployment summary"
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            const url = process.env.STAGING_URL || 'see secrets';
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `${status} **Staging deployment** — ${url}/api/v1/health`
            });
        env:
          STAGING_URL: ${{ secrets.STAGING_API_URL }}
