# ═══════════════════════════════════════════════════════════════
# PredictIQ — CI/CD Pipeline (GitHub Actions)
# ═══════════════════════════════════════════════════════════════

name: PredictIQ CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Security Scan ──────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run pre-push security check
        run: python scripts/pre_push_check.py

      - name: Verify no .env files tracked
        run: |
          if git ls-files --cached | grep -E '\.env$|\.env\.' | grep -v '.example'; then
            echo "::error::Environment files are tracked by git!"
            exit 1
          fi
          echo "No .env files tracked — OK"

  # ── Backend Tests ─────────────────────────────────────────
  backend-tests:
    name: Backend Tests (Python 3.13)
    runs-on: ubuntu-latest
    needs: [security-scan]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Copy env template
        run: cp backend/.env.example backend/.env

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short --junitxml=../test-results/backend.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: test-results/

  # ── Frontend Build ────────────────────────────────────────
  frontend-build:
    name: Frontend Build (Node 20)
    runs-on: ubuntu-latest
    needs: [security-scan]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci --silent

      - name: TypeScript check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build production bundle
        run: |
          cd frontend
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ── Docker Build ──────────────────────────────────────────
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t predictiq-backend:test .

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t predictiq-frontend:test .

      - name: Verify images exist
        run: |
          docker images predictiq-backend:test
          docker images predictiq-frontend:test

