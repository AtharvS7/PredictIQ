# ═══════════════════════════════════════════════════════════════
# PredictIQ — Nginx Configuration
# Serves React SPA with API reverse proxy to FastAPI backend
# ═══════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name localhost;

    # Maximum upload size (for PDF/DOCX documents)
    client_max_body_size 10m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Serve static files from React build
    root /usr/share/nginx/html;

    # React SPA — fallback all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy → FastAPI backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for ML prediction (may take a few seconds)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Cache static assets aggressively (JS, CSS, images)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Do not cache the HTML shell (always fetch latest for SPA)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Access and error logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
