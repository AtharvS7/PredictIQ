# ═══════════════════════════════════════════════════════════════
# PredictIQ — Nginx Configuration (Performance Optimized)
# Serves React SPA with API reverse proxy to FastAPI backend
# ═══════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name localhost;

    # Maximum upload size (for PDF/DOCX documents)
    client_max_body_size 10m;

    # ── Gzip Compression (optimized) ──────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml
        font/woff2
        font/woff;

    # Serve static files from React build
    root /usr/share/nginx/html;

    # ── Security Headers ──────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # React SPA — fallback all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy → FastAPI backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for ML prediction (may take a few seconds)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # Enable proxy buffering for faster responses
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    # Cache static assets aggressively (JS, CSS, images — hashed filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache fonts aggressively
    location ~* \.(woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache images
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Do not cache the HTML shell (always fetch latest for SPA)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Access and error logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}

