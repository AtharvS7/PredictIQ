# ═══════════════════════════════════════════════════════════════
# Predictify — Docker Compose Development Override
# ═══════════════════════════════════════════════════════════════
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# This mounts source code for hot-reload during development.
# ═══════════════════════════════════════════════════════════════

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    volumes:
      - ./backend:/app
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
